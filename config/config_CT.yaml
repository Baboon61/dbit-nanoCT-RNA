samples:
  P35765_1003:                                                                                                               # Modify the name of your sample
    barcodes:                                                                                                                # Modify the different antibody barcodes
      H3K4me3: CCTATCCT
      H3K27me3: ATAGAGGC

general:
  rawData_dir: /date/gcb/gcb_BH/Data/SCTYH/P35765/Raw                                                                        # Modify raw data path for your sample
  processedData_dir: /date/gcb/gcb_BH/Data/SCTYH/Test/Processed/CutTag                                                       # Modify processed data path for your sample
  spatial_barcodes_file: barcodes/spatial_barcodes_10000.txt                                                                 # Modify the path to the spatial barcodes file for your sample (Maybe 10000 or 5000 barcodes)
  read_barcode: R2                                                                                                           # Modify which R file contains the barcodes in CutTag sample
  core: 2                                                                                                                    # Modify threads to use
  samtools_threads: 20                                                                                                       # Modify threads for samtools/sort rules
  sinto_threads: 20                                                                                                          # Modify threads for sinto fragments
  bamcoverage_threads: 20                                                                                                    # Modify threads for bamCoverage
  samtools_mem_mb: 32000                                                                                                     # Modify memory for samtools/sort rules
  sinto_mem_mb: 16000                                                                                                        # Modify memory for sinto fragments
  bamcoverage_mem_mb: 16000                                                                                                  # Modify memory for bamCoverage
  macs_mem_mb: 16000                                                                                                         # Modify memory for MACS2
  remove_LA_duplicates_mem_mb: 32000                                                                                         # Modify memory for LA duplicate removal
  debarcode_flush_every: 100000                                                                                              # Number of reads between debarcode output flushes
  debarcode_threads: 1                                                                                                       # Worker processes for debarcode.py chunk processing
  debarcode_chunk_size: 10000                                                                                                # Read triplets per debarcode.py worker chunk
  min_first_flush_ratio: 0.00001                                                                                             # Minimum selected-barcode read ratio required during the first debarcode flush
  tempdir: /date/gcb/gcb_BH/Data/SCTYH/Test/Processed/tmp_CT/                                                                # Modify path to a tmp folder already created
  fragtk_bin: /home/bastien/.cargo/bin/fragtk                                                                                # Modify the path to the fragtk executable
  cellranger:
    software_bin: /date/gcb/gcb_BH/cellranger_spatial/cellranger-atac-2.1.0/cellranger-atac                                  # Modify the path to cellranger CutTag binaries
    reference_path: /date/gcb/gcb_BH/cellranger_spatial/refdata-cellranger-arc-GRCh38-2020-A-2.0.0/                          # Modify the path to cellranger CutTag reference
    barcodes_path: /date/gcb/gcb_BH/cellranger_spatial/cellranger-atac-2.1.0/lib/python/atac/barcodes/                       # Modify the path of the cellranger CutTag barcodes file for your cellranger version (Maybe 737K-arc-v1.txt.gz)
    barcodes_file: 737K-cratac-v1.txt.gz                                                                                     # Modify the name of the cellranger CutTag barcode file for your cellranger version (Maybe 737K-arc-v1.txt.gz)
    core: 8                                                                                                                  # Modify the number of threads to use in cellRanger
    mem: 64                                                                                                                  # Modify the memory to use in cellRanger
  macs_genome: hs     #hs human, mm mouse                                                                                    # Modify genome for macs2 callpeak
  PCRprimer_sequence: CAAGCGTTGGCTTCTCGCATCT                                                                                 # Modify the PCR primer sequence
  linker1_sequence: GTGGCCGATGTTTCGCATCGGCGTACGACT                                                                           # Modify the linker1 sequence
  linker2_sequence: ATCCACGTGCTTGAGAGGCCAGAGCATTCG                                                                           # Modify the linker2 sequence
  adapt_Tn5: TAGATGTGTATAAGAGACAG                                                                                            # Modify the adapter sequence for the Tn5
  spatial_barcode1_length: 8                                                                                                 # Modify the length of the spatial barcode1
  spatial_barcode2_length: 8                                                                                                 # Modify the length of the spatial barcode2
  nanoCutTag_barcode_length: 8                                                                                               # Modify the length of the nano CutTag barcode
  hamming_distance_linkers: 3                                                                                                # Modify the hamming distance for linkers QC check
  bin_sizes: [2500]                                                                                                          # Modify the bin sizes to use for the count matrix generation
